- hosts: all
  become: yes
  tasks:
    - name: Get unallocated physical disks
      shell: { item }
      loop:
        - fdisk -l | grep "Disk /dev/" | grep -Ev "mapper|identifier|Disklabel|loop" 
        - pvs |awk '{print $1}' |grep dev

      register: disk_info

    - debug:
        msg: "{{ disk_info.stdout_lines }}"