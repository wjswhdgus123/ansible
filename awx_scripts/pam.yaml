- name: Set login failure threshold and lockout duration
  hosts: all
  become: true
  tasks:
    - name: Update PASS_MAX_DAYS in 
      lineinfile:
        path: /etc/pam.d/common-password
        regexp: 'pam_pwquality.so'
        line: 'pam_pwquality.so retry=3 minlen=8 lcredit=-1 ucredit=-1 dcredit=-1 ocredit=-1'