- hosts: all
  become: yes
  tasks:
   - name: Update and upgrade apt packages
     apt:
       upgrade: yes
       update_cache: yes
       cache_valid_time: 86400 #One day

   - name: install curl 
     apt:
       name: curl
       state: present
       update_cache: true

   - name: install iftop 
     apt:
       name: iftop
       state: present
       update_cache: true

  
   
   - name: install ntp 
     apt:
       name: chrony
       state: present
       update_cache: true
       
   - name: install nfs-common
     apt:
       name: nfs-common
       state: present
       update_cache: true